services:

  influxdb:
    image: influxdb:2.7
    container_name: keenetic-influxdb
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    env_file: .env
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${MEM_INFLUXDB:-8g}

  receiver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keenetic-receiver
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      influxdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${MEM_RECEIVER:-256m}

  ping_monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keenetic-ping-monitor
    restart: unless-stopped
    command: ["python", "ping_monitor.py"]
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      influxdb:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: ${MEM_PING_MONITOR:-128m}

  grafana:
    image: grafana/grafana:10.2.0
    container_name: keenetic-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    env_file: .env
    environment:
      - GF_DEFAULT_LOCALE=ru-RU
    depends_on:
      - influxdb
    deploy:
      resources:
        limits:
          memory: ${MEM_GRAFANA:-512m}

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
